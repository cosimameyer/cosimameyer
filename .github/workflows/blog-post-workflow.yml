name: Latest blog post workflow
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BLOG_TOKEN }} # Uses your VIP pass to checkout

      - name: Pull in cosimameyer.com posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          gh_token: ${{ secrets.BLOG_TOKEN }} # Uses your VIP pass to push
          feed_list: "https://cosimameyer.com/index.xml"
          max_post_count: 5
          template: "$newline- [$title]($url) ($date)"
          committer_username: "github-actions[bot]"
          committer_email: "github-actions[bot]@users.noreply.github.com"